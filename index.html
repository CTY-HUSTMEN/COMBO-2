<head>

<meta charset="UTF-8">

<title>COMBO 2</title>
<link rel="icon" href="logo.png">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// =====================
// FIREBASE CONFIG
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyBtdk8zuVGkueYcRurRIAWIm_AlTrrGg9Y",
  authDomain: "su-kien-fe294.firebaseapp.com",
  databaseURL: "https://su-kien-fe294-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "su-kien-fe294",
  storageBucket: "su-kien-fe294.firebasestorage.app",
  messagingSenderId: "863152941656",
  appId: "1:863152941656:web:f4adea7c33d941a9d8b82d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// =====================
// BIẾN
// =====================
window.type = "";
const ITEM_NAME = "COMBO_2";
let isProcessing = false;
let unsubscribe = null;

// =====================
// STEP UI
// =====================
// =====================
// STEP UI
// =====================
window.goStep = function(step, selectedType=""){
    if(selectedType) type = selectedType;

    // 🔥 ẨN TẤT CẢ STEP (Kiểm tra tồn tại trước khi ẩn)
    if (document.getElementById("step1")) document.getElementById("step1").style.display="none";
    if (document.getElementById("step2")) document.getElementById("step2").style.display="none";
    if (document.getElementById("step3")) document.getElementById("step3").style.display="none";

    // 🔥 HIỆN STEP CẦN
    let targetStep = document.getElementById("step" + step);
    if (targetStep) {
        targetStep.style.display="block";
    }

    if(step===2){
        document.getElementById("stepTitle").innerText =
            type==="gift" ? "Nhận quà" : "Bán sản phẩm";
        let btnStep2 = document.querySelector("#step2 button");
        if (btnStep2) btnStep2.disabled = true;
    }

    if(step===3){
        if (document.getElementById("addQuantity")) {
            document.getElementById("addQuantity").value = 1;
        }
    }
}

window.resetForm = function(){
    // step2
    if (document.getElementById("quantity")) document.getElementById("quantity").value=1;
    if (document.getElementById("counter")) document.getElementById("counter").value="";
    if (document.getElementById("addHuongType")) document.getElementById("addHuongType").value="";

    // 🔥 step3 (Kiểm tra tồn tại trước khi reset)
    if (document.getElementById("addCounter")) document.getElementById("addCounter").value="";
    if (document.getElementById("addCombo")) document.getElementById("addCombo").value="";
    if (document.getElementById("addQuantity")) document.getElementById("addQuantity").value=1;

    // 🔥 clear realtime listener
    if(unsubscribe){
        unsubscribe();
        unsubscribe = null;
    }

    type="";
    goStep(1);
}
window.addStock = function(){

    const counter = document.getElementById("addCounter").value;
    const combo = "COMBO_2";
    const quantity = Number(document.getElementById("addQuantity").value);
    const huongType = document.getElementById("addHuongType").value;

    if(!counter || !huongType){
        alert("Chọn đầy đủ thông tin");
        return;
    }

    const comboRef = ref(db, "kho/" + counter + "/" + combo);
    const muiRef   = ref(db, "kho/" + counter + "/HUT_MUI_TU_LANH");
    const huongRef = ref(db, "kho/" + counter + "/TUI_TOA_HUONG/" + huongType);

    // =========================
    // 1. CHECK NGUYÊN LIỆU
    // =========================
    Promise.all([
        runTransaction(muiRef, data => data),
        runTransaction(huongRef, data => data)
    ]).then(([muiSnap, huongSnap]) => {

        const mui = muiSnap.snapshot.val()?.stock || 0;
        const huong = huongSnap.snapshot.val()?.stock || 0;

        if(mui < quantity || huong < quantity*2){
            alert("Không đủ hàng để thêm vào combo");
            return;
        }

        // =========================
        // 2. TRỪ + CỘNG (ROOT TRANSACTION)
        // =========================
        runTransaction(ref(db), (root) => {

            if(!root) return root;

            const path = root.kho[counter];

            if(!path) return;

            const muiStock = path["HUT_MUI_TU_LANH"]?.stock || 0;
            const huongStock = path["TUI_TOA_HUONG"]?.[huongType]?.stock || 0;

            if(muiStock < quantity || huongStock < quantity*2){
                return; // fail
            }

            // 🔻 trừ nguyên liệu
            path["HUT_MUI_TU_LANH"].stock -= quantity;
            path["TUI_TOA_HUONG"][huongType].stock -= quantity*2;

            // 🔺 cộng combo
            if(!path[combo]){
                path[combo] = { stock: 0 };
            }

            path[combo].stock = (path[combo].stock || 0) + quantity;

            return root;

        }).then(res => {

            if(!res.committed){
                alert("Lỗi cập nhật");
                return;
            }

            // =========================
            // LOG
            // =========================
            const logRef = ref(db, "logs/add");

            push(logRef, {
                time: Date.now(),
                item: combo,
                quantity: quantity,
                counter: counter,

                materials: {
                    HUT_MUI_TU_LANH: quantity,
                    ["TUI_TOA_HUONG_" + huongType]: quantity * 2
                }
            });

            alert("Thêm hàng thành công");
            goStep(1);
        });

    });
}

// =====================
// REALTIME STOCK (NEW - THEO HƯƠNG)
// =====================
function listenStock(){

    const counter = document.getElementById("counter").value;
    const huongType = document.getElementById("addHuongType").value;
    const btn = document.querySelector("#step2 button");

    if(!counter || !huongType){
        document.getElementById("stockDisplay").innerText = "Tồn kho: ...";
        btn.disabled = true;
        return;
    }

    if(unsubscribe) unsubscribe();

    const stockRef = ref(db, "kho/" + counter + "/COMBO_2/" + huongType + "/stock");

    unsubscribe = onValue(stockRef, (snapshot) => {

        let stock = snapshot.val() || 0;

        document.getElementById("stockDisplay").innerText =
            "Tồn kho: " + stock;

        if(stock <= 100){
            document.getElementById("stockWarning").innerText =
                "Sản phẩm chỉ còn lại " + stock;
        } else {
            document.getElementById("stockWarning").innerText = "";
        }

        if(!isProcessing){
            btn.disabled = stock <= 0;
        }
    });
}

// 🔥 GỌI KHI USER CHỌN
document.getElementById("counter").addEventListener("change", listenStock);
document.getElementById("addHuongType").addEventListener("change", listenStock);

// =====================
// SUBMIT
// =====================
window.submitForm = function(){

    let btn = document.querySelector("#step2 button");

    if(btn.disabled || isProcessing) return;

    isProcessing = true;
    btn.disabled = true;
    btn.innerText = "Đang xử lý...";

    const quantity = Number(document.getElementById("quantity").value);
    const counter = document.getElementById("counter").value;
    const huongType = document.getElementById("addHuongType").value;

    if(!counter || !huongType){
        alert("Chọn đầy đủ thông tin");
        resetBtn();
        return;
    }

    runTransaction(ref(db), (root) => {

        if(!root) return root;

        const path = root.kho[counter];
        if(!path) return;

        // ===== NGUYÊN LIỆU =====
        const mui = path["HUT_MUI_TU_LANH"]?.stock || 0;
        const huong = path["TUI_TOA_HUONG"]?.[huongType]?.stock || 0;

        if(mui < quantity || huong < quantity*2){
            return; // fail
        }

        // ===== TRỪ NGUYÊN LIỆU =====
        path["HUT_MUI_TU_LANH"].stock -= quantity;
        path["TUI_TOA_HUONG"][huongType].stock -= quantity * 2;

        // ===== COMBO =====
        if(!path["COMBO_2"]) path["COMBO_2"] = {};
        if(!path["COMBO_2"][huongType]){
            path["COMBO_2"][huongType] = {
                stock: 0,
                daBan: 0,
                daTang: 0
            };
        }

        let combo = path["COMBO_2"][huongType];

        // ===== CỘNG COMBO =====
        combo.stock += quantity;

        // ===== TRỪ COMBO NGAY =====
        if(combo.stock < quantity){
            return; // fail
        }

        combo.stock -= quantity;

        if(type === "buy") combo.daBan += quantity;
        if(type === "gift") combo.daTang += quantity;

        return root;

    }).then(res => {

        if(!res.committed){
            alert("Không đủ hàng");
            return;
        }

        // ===== LOG =====
        const logRef = ref(db, "logs/" + type);

        push(logRef, {
            time: Date.now(),
            item: "COMBO_2",
            variant: huongType, // 🔥 QUAN TRỌNG
            quantity: quantity,
            counter: counter,

            materials: {
                HUT_MUI_TU_LANH: quantity,
                ["TUI_TOA_HUONG_" + huongType]: quantity * 2
            }
        });

        alert("Thành công");

        resetForm();

    }).catch(() => {
        alert("Lỗi hệ thống");
    }).finally(() => {
        resetBtn();
    });

    function resetBtn(){
        btn.disabled = false;
        btn.innerText = "Xác nhận";
        isProcessing = false;
    }
}
</script>

<body>

<div class="wrapper">

</div>
</div>

</body>
